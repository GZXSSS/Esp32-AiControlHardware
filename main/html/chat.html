<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>AI 助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 12px 0;
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 1px solid #ddd;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
            background: #e9ecef;
            align-self: flex-start;
        }
        .message.user-msg {
            background: #007aff;
            color: white;
            align-self: flex-end;
        }
        .message.system-msg {
            background: #e9ecef;
            color: #1e1e1e;
        }
        .message.control-msg {
            background: #34c759;
            color: white;
            align-self: center;
            font-weight: 500;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px 0;
            background: white;
            border-top: 1px solid #ddd;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #ccc;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #007aff;
        }
        .input-area button {
            padding: 10px 20px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .input-area button:disabled {
            background: #aac4e0;
        }
        .status {
            text-align: center;
            font-size: 14px;
            color: #888;
            padding-top: 6px;
        }
        .clear-btn {
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 6px 14px;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
        }
        .clear-btn:hover {
            background: #d70015;
        }
    </style>
</head>
<body>
<div class="header">
    🤖 AI 控制助手
    <button class="clear-btn" id="clearBtn" aria-label="清空对话">清空</button>
</div>
<div class="messages" id="messageArea">
    <div class="message system-msg">👋 你好！输入指令，AI 将控制 D2 引脚（开/关/流水）。</div>
</div>
<div class="input-area">
    <label for="inputBox" class="sr-only">聊天输入框</label>
    <input type="text" id="inputBox" placeholder="例如：开灯、关灯、流水模式..." />
    <button id="sendBtn" aria-label="发送消息">发送</button>
</div>
<div class="status" id="statusBar">就绪</div>
<!-- 设置按钮 -->
<button id="settingsBtn" aria-label="打开AI配置" style="position:fixed; top:10px; right:10px; z-index:10;">⚙️</button>

<!-- 设置模态框 -->
<div id="settingsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:20; justify-content:center; align-items:center;">
    <div style="background:#fff; padding:20px; border-radius:8px; max-width:400px; width:90%;">
        <h3>AI 配置</h3>
        <div><label for="setUrl">API 地址</label><br><input id="setUrl" style="width:100%;" placeholder="https://api.siliconflow.cn/v1/chat/completions"></div>
        <div><label for="setApiKey">API Key</label><br><input id="setApiKey" style="width:100%;" type="password" placeholder="sk-..."></div>
        <div><label for="setModel">模型名称</label><br><input id="setModel" style="width:100%;" placeholder="Qwen/Qwen2.5-7B-Instruct"></div>
        <div style="margin-top:10px;">
            <button id="saveConfigBtn" aria-label="保存AI配置">保存</button>
            <button id="clearConfigBtn" aria-label="清空AI配置">清空配置</button>
            <button id="closeSettingsBtn" aria-label="关闭配置面板">取消</button>
        </div>
        <div id="configMsg"></div>
    </div>
</div>

<script>
    (function() {
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');
        const messageArea = document.getElementById('messageArea');
        const statusBar = document.getElementById('statusBar');
        const clearBtn = document.getElementById('clearBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const setUrl = document.getElementById('setUrl');
        const setApiKey = document.getElementById('setApiKey');
        const setModel = document.getElementById('setModel');
        const configMsg = document.getElementById('configMsg');

        function addMessage(text, type = 'system') {
            const div = document.createElement('div');
            const mappedType = type === 'user' ? 'user-msg' : (type === 'control' ? 'control-msg' : 'system-msg');
            div.className = 'message ' + mappedType;
            div.textContent = text;
            messageArea.appendChild(div);
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        function setStatus(text, isError = false) {
            if (!statusBar) return;
            statusBar.textContent = text;
            statusBar.style.color = isError ? '#ff3b30' : '#888';
        }

        async function sendQuery(query) {
            if (!query.trim()) return;
            // 显示用户消息
            addMessage(query, 'user');
            inputBox.value = '';
            sendBtn.disabled = true;
            setStatus('AI 思考中...');

            try {
                const url = '/chat?q=' + encodeURIComponent(query);
                const response = await fetch(url);
                const contentType = response.headers.get('content-type') || '';
                const result = contentType.includes('application/json') ? await response.json() : { reply: await response.text() };

                if (!response.ok) {
                    const errText = typeof result === 'string' ? result : (result.reply || '请求失败');
                    addMessage('❌ ' + errText, 'system');
                    setStatus('请求失败', true);
                } else if (result.type === 'control') {
                    addMessage('✅ ' + (result.reply || '已执行'), 'control');
                    setStatus('控制执行成功');
                } else {
                    // 普通回复
                    const reply = result.reply || result.message || result;
                    addMessage(reply, 'system');
                    setStatus('回复已显示');
                }
            } catch (error) {
                addMessage('❌ 请求失败: ' + error.message, 'system');
                setStatus('连接错误', true);
            } finally {
                sendBtn.disabled = false;
                if (!statusBar.textContent.includes('成功')) {
                    setStatus('就绪');
                }
            }
        }

        sendBtn.addEventListener('click', function() {
            sendQuery(inputBox.value);
        });

        inputBox.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendQuery(inputBox.value);
            }
        });

        clearBtn.addEventListener('click', function() {
            messageArea.innerHTML = '';
            addMessage('👋 对话已清空', 'system');
            setStatus('就绪');
        });

        // 自动聚焦
        inputBox.focus();
    })();
    // 加载当前配置
    async function loadConfig() {
        try {
            const res = await fetch('/get_ai_config');
            const data = await res.json();
            setUrl.value = data.url || '';
            if (data.configured) {
                setApiKey.value = data.api_key || '';
                setModel.value = data.model || '';
            } else {
                setApiKey.value = '';
                setModel.value = '';
            }
        } catch(e) { console.error(e); }
    }

    // 保存配置
    async function saveConfig() {
        const url = setUrl.value.trim();
        const apiKey = setApiKey.value.trim();
        const model = setModel.value.trim();
        if (!apiKey || !model) {
            alert('请填写 API Key 和模型名称');
            return;
        }
        const body = `api_key=${encodeURIComponent(apiKey)}&model=${encodeURIComponent(model)}&url=${encodeURIComponent(url)}`;
        try {
            const res = await fetch('/set_ai_config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body
            });
            configMsg.innerText = await res.text();
            if (res.ok) {
                alert('配置已保存并应用！');
                settingsModal.style.display = 'none';
                await loadConfig();
            }
        } catch (e) {
            configMsg.innerText = '请求失败：' + e;
        }
    }


        async function clearConfig() {
            try {
                const res = await fetch('/clear_ai_config', { method: 'POST' });
                configMsg.innerText = await res.text();
                if (res.ok) {
                    setUrl.value = '';
                    setApiKey.value = '';
                    setModel.value = '';
                    alert('AI 配置已清空');
                }
            } catch (e) {
                configMsg.innerText = '请求失败：' + e;
            }
        }
    // 事件绑定
    settingsBtn.addEventListener('click', () => {
        settingsModal.style.display = 'flex';
        loadConfig();
    });
    document.getElementById('closeSettingsBtn').addEventListener('click', () => {
        settingsModal.style.display = 'none';
    });
    document.getElementById('saveConfigBtn').addEventListener('click', saveConfig);
    document.getElementById('clearConfigBtn').addEventListener('click', clearConfig);
    settingsModal.addEventListener('click', (e) => {
        if (e.target === settingsModal) settingsModal.style.display = 'none';
    });
</script>
</body>
</html>
